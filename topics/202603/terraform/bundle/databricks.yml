bundle:
  name: azure-keyvault-secret-scope-bundle

# Optional: global variables (recommended for reuse across envs)
variables:
  key_vault_dns_name:
    description: Azure Key Vault DNS name (e.g. https://my-kv.vault.azure.net/)
  key_vault_resource_id:
    description: Azure Key Vault resource ID

resources:
  secret_scopes:
    secret_scope_azure:
      name: test-secrets-azure-backend-2
      backend_type: AZURE_KEYVAULT
      keyvault_metadata:
        resource_id: ${var.key_vault_resource_id}
        dns_name: ${var.key_vault_dns_name}

targets:
  prod:
    mode: production
    default: true
    workspace:
      host: https://adb-1179923690951934.14.azuredatabricks.net
      root_path: /Workspace/Users/hubert.dudek@brickschool.io/.bundle/${bundle.name}/${bundle.target}

