# Databricks Asset Bundle definition generated from the course custom template.
bundle:
  name: data_marketing_videobundle
  databricks_cli_version: '>= 0.266.0, < 1.0.0'

include:
  - resources/*.yml

variables:
  default_catalog:
    default: main
  default_schema:
    default: videobundle_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://your-dev-workspace.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://your-dev-workspace.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
